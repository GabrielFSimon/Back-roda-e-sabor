services:
  postgres:
    image: postgres:16
    container_name: roda_sabor_postgres
    restart: always
    environment:
      POSTGRES_DB: restaurante_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurante_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: roda_sabor_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: restaurante_db
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: 1234
      API_PORT: 3333
      JWT_SECRET: roda_sabor_chave_secreta
    command: npm start

volumes:
  postgres_data:
